[workspace]
members = ["."]

[package]
name = "snled27351_driver"
version = "0.1.0"
description = "Async embedded-hal driver for the SNLED27351 matrix LED driver IC, supporting SPI and I2C transports"
repository = "https://github.com/fuchskurt/snled27351_driver"
edition = "2024"
license = "MIT OR Apache-2.0"

[features]
i2c = []
spi = []

[dependencies]
embedded-hal = "1"
embedded-hal-async = "1"
embassy-time = { git = "https://github.com/embassy-rs/embassy.git" }

[workspace.lints.rust]
warnings = "deny"

[workspace.lints.clippy]
all = "deny"
pedantic = "deny"
restriction = "deny"
nursery = "deny"
blanket_clippy_restriction_lints = "allow"
future_not_send = "allow"
implicit_return = "allow"
separated_literal_suffix = "allow"
single_call_fn = "allow"
self_named_module_files = "allow"
pub_with_shorthand = "allow"
pub_use = "allow"

[lints]
workspace = true

[[dylib]]
name = "snled27351_driver"
test = false
bench = false

[profile.release]
lto = "fat"
codegen-units = 1